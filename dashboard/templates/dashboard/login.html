{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>User dashboard</title>
    <link rel="stylesheet" href="{% static 'dashboard/styles.css' %}">
  </head>
  <body>

    <header>
      <h1>User Dashboard Login</h1>
    </header>

    <main>
      <article>
        <section>
          <h2>Login details</h2>
          <hr>
          <form action="{% url 'dashboard:login' %}" method="post">
            {% csrf_token %}
            {{ form }}
            <div id="reset-password" class="links">
              <a href="">Forgot password?</a>
            </div>
            <div>
              <button class="submit">Log in</button>
            </div>
          </form>
          <hr>
          <div id="register">
            <a href="">Register an account</a>
          </div>
        </section>
      </article>
    </main>

    <footer>
      <p>
        Server created by <a target="blank" href="https://github.com/al1sant0s">@al1sant0s</a>
      </p>
    </footer>

  </body>
</html>
